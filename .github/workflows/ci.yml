name: CI

# Core merge gate (R16/R17): lint + types + offline mock-LLM tests.
# NO API keys, NO network-dependent steps — tests-core run on HashEmbedder +
# mock LLM only (markers `slow`/`live` are excluded).
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + mypy + pytest (py ${{ matrix.python-version }}, offline)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]  # floor (3.12) + a recent release — catch both ends
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install (.[dev])
        run: uv pip install --system ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy (strict)
        run: mypy cold_frame

      - name: pytest (core, offline) + coverage floor
        # No keys, no network: exclude slow + live markers. --cov-fail-under guards regression;
        # the README badge shows the current number (refresh it when it moves — see CONTRIBUTING).
        run: pytest -q -m "not slow and not live" --cov=cold_frame --cov-report=term --cov-fail-under=85

      - name: Coverage table in the job summary
        if: always() # most useful exactly when the floor just failed
        run: |
          { echo '### Coverage (core gate)'; python -m coverage report --format=markdown; } \
            >> "$GITHUB_STEP_SUMMARY" || true

  # ── Frontend checks (Node-only; kept OUT of the core gate above) ─────────
  # (1) API codegen freshness: the JSON contract is single-sourced in cold_frame/ui/contract.py;
  #     regenerate schema + TS and fail on any diff so a stale TS client can't ship.
  # (2) The SPA actually builds and produces a REAL bundle — so a release machine can never ship a
  #     wheel that silently fell back to the inline inspector (the wheel only carries what's in _dist).
  frontend:
    name: frontend (codegen fresh + SPA builds)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json  # packageManager lives in the frontend workspace

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm -C frontend install --frozen-lockfile

      - name: Regenerate API types (schema + TS)
        run: pnpm -C frontend run gen:types

      - name: Fail on stale generated files
        run: git diff --exit-code -- frontend/src/api.schema.json frontend/src/api.generated.ts

      - name: Typecheck the SPA
        run: pnpm -C frontend run typecheck

      - name: Build the SPA bundle
        run: pnpm -C frontend run build

      - name: Assert the wheel-shippable bundle is real (not the .gitkeep placeholder)
        run: python scripts/check_ui_bundle.py

  install-smoke:
    name: fresh install smoke (built wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build the wheel
        run: uv build --wheel
      # install the wheel into a CLEAN venv (no source tree, no dev deps) → catches a broken entry
      # point, missing package data, or an import that only works from the repo. Offline smoke.
      - name: Install the wheel clean + smoke it offline
        run: |
          uv venv /tmp/smoke --python 3.12
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          export COLD_FRAME_DB=/tmp/smoke.db
          /tmp/smoke/bin/cold-frame --version
          /tmp/smoke/bin/cold-frame add "I prefer dark roast coffee"
          /tmp/smoke/bin/cold-frame search "coffee" | grep -q coffee
          /tmp/smoke/bin/cold-frame doctor

  # ── Publishing ───────────────────────────────────────────────────────────
  # Release/publish is NOT in this CI; it lives in release.yml (fires on a `v*` tag → GitHub Release
  # + per-platform binaries + Homebrew tap bump; NOT PyPI, ADR-D28). D19 name is locked; tag to ship.
