name: Release

# Fires when a version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# Distribution is via Homebrew + direct binary download — NOT PyPI. The tag builds a self-contained
# `cold-frame` binary per platform (CLI + MCP server in one file, no Python needed at runtime) and
# attaches them to the GitHub Release; the Homebrew tap formula installs the matching binary.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release the binary jobs upload to
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  binaries:
    name: standalone binary (${{ matrix.target }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: macos-arm64 } # Apple Silicon (Intel Macs are out of scope)
          - { os: ubuntu-latest, target: linux-x86_64 }
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # upload the asset to the Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The SPA bundle (cold_frame/ui/_dist) is git-ignored and built here, BEFORE the freeze —
      # a bare checkout has an empty _dist, and shipping that would silently degrade `cold-frame ui`
      # to the inline inspector. build.sh asserts the bundle pre-freeze AND live-serves it post-freeze.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json # packageManager lives in the frontend workspace
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Build the web UI bundle (ships inside the binary)
        run: |
          pnpm -C frontend install --frozen-lockfile
          pnpm -C frontend run build
          python scripts/check_ui_bundle.py
      - name: Build self-contained binary (CLI + MCP + web UI)
        run: bash packaging/standalone/build.sh "$PWD/dist-bin"
      - name: Name the asset per platform
        run: mv dist-bin/cold-frame "dist-bin/cold-frame-${{ matrix.target }}"
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-bin/cold-frame-${{ matrix.target }}

  bump-tap:
    name: update the Homebrew tap
    needs: binaries # only after every platform binary is attached to the Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate + push the tap formula (version + per-platform sha256)
        # Skips gracefully if HOMEBREW_TAP_TOKEN is unset — a release never fails on a missing token.
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash packaging/homebrew/bump-tap.sh "${{ github.ref_name }}"
