name: Release

# Fires when a version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# Publishes the wheel/sdist to PyPI via OIDC trusted publishing (no token stored in the repo —
# configure the trusted publisher once on PyPI: project `cold-frame`, this repo, workflow `Release`,
# environment `pypi`), and builds + attaches a standalone binary per platform to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  pypi:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC trusted publishing
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release (with the dist artifacts)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  binaries:
    name: standalone binary (${{ matrix.target }})
    needs: pypi
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: macos-arm64 }
          - { os: macos-13, target: macos-x86_64 }
          - { os: ubuntu-latest, target: linux-x86_64 }
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build self-contained binary
        run: bash packaging/standalone/build.sh "$PWD/dist-bin"
      - name: Name the asset per platform
        run: mv dist-bin/cold-frame "dist-bin/cold-frame-${{ matrix.target }}"
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-bin/cold-frame-${{ matrix.target }}
