# P6 gate suite: the explicit-id self-edit tools route through the ONE WriteCore (I15).
# The `supersede` op calls apply_tool("supersede", ...) → commit_supersede (no LLM, deterministic).
# This is the commit_supersede half of the I15 proof; create_fact (commit half) is covered by
# test_self_edit_path_matches_suite running dedup+freshness via_tool.
suite: self_edit
embedder: hash
cases:
  - id: supersede-tool-archives-old
    description: "supersede via the self-edit tool: old archived + invalid_at + supersedes edge"
    steps:
      - op: add
        at: "2026-01-02T09:00:00Z"
        scope: {user_id: bob}
        text: "I work at Vessl"
        extra: {raw: true}
      - op: supersede
        at: "2026-06-02T09:00:00Z"
        scope: {user_id: bob}
        text: "I work at Anthropic"
        extra: {content_like: "Vessl"}  # target the prior note by content
    expect:
      notes:
        - where: {content_like: "Anthropic"}
          status: active
        - where: {content_like: "Vessl"}
          status: archived
          invalid_at: "2026-06-02T09:00:00Z"  # valid-time end = new fact's valid_at (C3)
      edges:
        - {relation: supersedes, src_like: "Anthropic", dst_like: "Vessl"}
      search:
        - query: "where do I work"
          scope: {user_id: bob}
          expect_top_content_like: "Anthropic"  # current belief after the tool edit

  - id: update-fact-tool-edits-in-place-of-belief
    description: "update_fact via the tool supersedes the old belief with the corrected text"
    steps:
      - op: add
        at: "2026-02-01T09:00:00Z"
        scope: {user_id: carol}
        text: "the API timeout is 30 seconds"
        extra: {raw: true}
      - op: update_fact
        at: "2026-05-01T09:00:00Z"
        scope: {user_id: carol}
        text: "the API timeout is 60 seconds"
        extra: {content_like: "timeout"}
    expect:
      notes:
        - where: {content_like: "60 seconds"}
          status: active
        - where: {content_like: "30 seconds"}
          status: archived
      search:
        - query: "API timeout"
          scope: {user_id: carol}
          expect_top_content_like: "60 seconds"
